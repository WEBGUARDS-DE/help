<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - WEBGUARDS</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .container {
      max-width: 600px;
      margin: 60px auto;
      padding: 40px 20px;
    }

    h1 {
      margin-bottom: 30px;
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }

    input, textarea, select {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 150px;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }

    .optional {
      font-size: 12px;
      color: #999;
      font-weight: normal;
    }

    button {
      background-color: #0066cc;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #0052a3;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 4px;
      display: none;
    }

    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .loading {
      display: none;
      font-size: 14px;
      color: #999;
      margin-top: 10px;
    }

    .loading.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Support-Anfrage</h1>
    
    <form id="support-form">
      <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="telefon">Telefon <span class="optional">(optional)</span></label>
        <input type="tel" id="telefon" name="telefon">
      </div>

      <div class="form-group">
        <label for="kategorie">Kategorie *</label>
        <select id="kategorie" name="kategorie" required>
          <option value="">-- Bitte wählen --</option>
          <option value="installation">Installation</option>
          <option value="billing">Abrechnung</option>
          <option value="account">Konto</option>
          <option value="technical">Technisch</option>
          <option value="other">Sonstiges</option>
        </select>
      </div>

      <div class="form-group">
        <label for="nachricht">Nachricht *</label>
        <textarea id="nachricht" name="nachricht" required></textarea>
      </div>

      <button type="submit" id="submit-btn">Senden</button>
      <div class="loading" id="loading">Wird verarbeitet...</div>
    </form>

    <div class="message" id="message"></div>
  </div>

  <script src="../assets/js/form-handler.js"></script>
</body>
</html>
